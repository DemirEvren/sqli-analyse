apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: opencost
  namespace: opencost
  annotations:
    argocd.argoproj.io/sync-wave: "0"  # After prometheus-operator (wave -2) installs the CRD
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  labels:
    app.kubernetes.io/name: opencost
    app.kubernetes.io/part-of: opencost
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: opencost
  endpoints:
  - port: http
    interval: 30s
    scrapeTimeout: 10s
    path: /metrics
