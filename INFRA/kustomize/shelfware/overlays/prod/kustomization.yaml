apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: prod-shelfware

resources:
- ../../base
- namespace.yaml
- ingress.yaml
- keda-scaledobject.yaml

patches:
- path: backend-resources-patch.yaml
- patch: |-
    - op: replace
      path: /data/CORS_ORIGIN
      value: "http://localhost,http://localhost:5173,http://localhost:3001,http://shelfware.local:8080,http://shelfware.local"
  target:
    kind: ConfigMap
    name: backend-config
labels:
- pairs:
    environment: prod
images:
- name: ghcr.io/demirevren/shelfware-backend
  newTag: latest
- name: ghcr.io/demirevren/shelfware-frontend
  newTag: latest

# Replicas worden door de CI-pipeline geflipt (1 = actief, 0 = inactief)
# zodat slechts één env tegelijk vCPU gebruikt (Azure-quota: 10 vCPU).
replicas:
- name: backend
  count: 1
- name: frontend
  count: 1
